schema_version: "1"
project:
  name: mock-research
  revision: fixture-v1
dataset:
  path: dataset.jsonl
adapter:
  type: http
  base_url: https://offline.invalid
  endpoint: /api/v1/runs
  fixture_path: responses.json
  request:
    json:
      query: $.input.query
      allowed_domains: $.input.allowed_domains
  response_mapping:
    retrieved_items: $.sources
    answer: $.answer
    claims: $.claims
    citations: $.citations
    usage: $.usage
    outcome: $.outcome
    system: $.versions
execution_policy:
  min_completion_rate: 1.0
  retries: 0
  max_retryable_error_rate: 0.0
metrics:
  - type: source_quality
  - type: evidence_recall
  - type: citation_validity
  - type: claim_coverage
  - type: expected_outcome
  - type: conflict_preservation
  - type: latency
gates:
  - metric: accepted_source_rate
    min: 1.0
  - metric: evidence_recall
    min: 1.0
  - metric: citation_validity
    min: 1.0
  - metric: expected_outcome_accuracy
    min: 1.0
  - metric: conflict_preservation
    min: 1.0
report:
  formats: [json, markdown]
  output_dir: reports
  include_inputs: true
  include_answers: false
  include_retrieved_content: false
  include_claims: true
