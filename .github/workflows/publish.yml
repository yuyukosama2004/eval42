name: Publish package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub Release tag whose distributions will be published
        required: true
        default: v0.1.0a1
        type: string
      index:
        description: Package index
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

concurrency:
  group: publish-${{ inputs.index }}-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Verify GitHub Release distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install "packaging>=24,<27" "twine>=6.1,<7"
      - name: Download immutable release distributions
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: >-
          gh release download "$RELEASE_TAG"
          --repo "$GITHUB_REPOSITORY"
          --pattern "*.whl"
          --pattern "*.tar.gz"
          --dir dist
      - run: python -m twine check dist/*
      - name: Enforce package identity and release channel
        run: >-
          python scripts/validate_publish.py
          --dist dist
          --tag "${{ inputs.tag }}"
          --target "${{ inputs.index }}"
      - uses: actions/upload-artifact@v4
        with:
          name: eval42-distributions
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    if: inputs.index == 'testpypi'
    needs: prepare
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: eval42-distributions
          path: dist
      - name: Publish distributions with OIDC
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish stable release to PyPI
    if: inputs.index == 'pypi'
    needs: prepare
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: eval42-distributions
          path: dist
      - name: Publish distributions with OIDC
        uses: pypa/gh-action-pypi-publish@release/v1
