name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install -e ".[dev]"
      - name: Audit dependencies
        env:
          PYTHONUTF8: "1"
        run: python -m pip_audit --skip-editable --progress-spinner off
      - run: ruff check src tests scripts/validate_release.py scripts/validate_publish.py
      - run: mypy src
      - run: pytest --cov=eval42
      - run: python scripts/validate_phase0.py
      - run: python scripts/validate_release.py
      - run: python -m build
      - name: Create GitHub prerelease with distributions
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" dist/*
          --verify-tag
          --generate-notes
          --prerelease
          --title "Eval42 $GITHUB_REF_NAME"
